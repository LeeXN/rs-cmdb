name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/rs-cmdb

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Check code
        run: cargo check --workspace
      - name: Run Tests
        run: cargo test --workspace

  build-front:
    name: Build Frontend
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
        with:
          key: frontend
      - uses: jetli/trunk-action@v0.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json
      - name: Build Frontend
        run: |
          cd front
          npm ci
          trunk build --release
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front/dist/
          retention-days: 1

  build-backend:
    name: Build Backend (${{ matrix.target }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch-name: amd64
          - target: aarch64-unknown-linux-musl
            arch-name: arm64
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Create Python requirements
        run: echo "ziglang" > requirements.txt

      - name: Install Python (for ziglang)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
          
      - name: Cache cargo-zigbuild binary
        id: cache-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: ${{ runner.os }}-cargo-zigbuild-v1

      - name: Install Zig & cargo-zigbuild
        shell: bash
        run: |
          pip install ziglang
          
          if ! command -v cargo-zigbuild &> /dev/null; then
            echo "Cargo zigbuild not found in cache, compiling..."
            cargo install cargo-zigbuild
          else
            echo "Cargo zigbuild found in cache, skipping installation."
          fi

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Binary
        run: |
          cargo zigbuild --release --package server --target ${{ matrix.target }}
          cargo zigbuild --release --package client --target ${{ matrix.target }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p bin/${{ matrix.arch-name }}
          cp target/${{ matrix.target }}/release/rs-cmdb-server bin/${{ matrix.arch-name }}/
          cp target/${{ matrix.target }}/release/rs-cmdb-client bin/${{ matrix.arch-name }}/

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.arch-name }}
          path: bin
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: [build-backend]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: backend-*
          merge-multiple: true
          path: release-dist
      
      - name: Rename binaries for Release
        run: |
          cd release-dist
          mv amd64/rs-cmdb-server rs-cmdb-server-x86_64-linux-musl
          mv amd64/rs-cmdb-client rs-cmdb-client-x86_64-linux-musl
          mv arm64/rs-cmdb-server rs-cmdb-server-aarch64-linux-musl
          mv arm64/rs-cmdb-client rs-cmdb-client-aarch64-linux-musl
          rm -rf amd64 arm64

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-docker:
    name: Push Docker Image
    needs: [build-front, build-backend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: backend-amd64
          path: bin
      
      - uses: actions/download-artifact@v4
        with:
          name: backend-arm64
          path: bin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=tag
            type=sha,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.CI
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max